name: Deploy ATOC WordPress Theme

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-theme:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build

      - name: Package atoc-bar-v2
        shell: bash
        run: |
          find deploy/wordpress-theme/atoc-bar-v2 -mindepth 1 -maxdepth 1 \
            ! -name style.css ! -name functions.php ! -name index.php ! -name 404.php \
            -exec rm -rf {} +
          cp -R dist/. deploy/wordpress-theme/atoc-bar-v2/

      - name: Validate WordPress themes parent path
        shell: bash
        env:
          WP_THEME_REMOTE_PATH: ${{ secrets.WP_THEME_REMOTE_PATH }}
        run: |
          set -euo pipefail
          path="${WP_THEME_REMOTE_PATH:-}"

          if [[ -z "$path" ]]; then
            echo "::error::WP_THEME_REMOTE_PATH is empty. Set it to the WordPress themes parent directory."
            exit 1
          fi

          if [[ "$path" == */atoc-bar-v2 || "$path" == */atoc-bar-v2/ ]]; then
            echo "::error::WP_THEME_REMOTE_PATH must not include atoc-bar-v2. The workflow appends that folder automatically."
            exit 1
          fi

          if [[ "$path" != */wp-content/themes && "$path" != */wp-content/themes/ ]]; then
            echo "::error::WP_THEME_REMOTE_PATH must end with /wp-content/themes or /wp-content/themes/."
            exit 1
          fi

      - name: Back up and install canonical redirects
        uses: appleboy/ssh-action@v1.2.0
        env:
          WP_THEME_REMOTE_PATH: ${{ secrets.WP_THEME_REMOTE_PATH }}
        with:
          host: ${{ secrets.WP_DEPLOY_HOST }}
          username: ${{ secrets.WP_DEPLOY_USER }}
          port: ${{ secrets.WP_DEPLOY_PORT }}
          password: ${{ secrets.WP_DEPLOY_PASSWORD }}
          key: ${{ secrets.WP_DEPLOY_SSH_KEY }}
          envs: WP_THEME_REMOTE_PATH
          script: |
            set -eu
            themes_path="${WP_THEME_REMOTE_PATH%/}"
            suffix="/wp-content/themes"

            case "$themes_path" in
              *"$suffix") ;;
              *)
                echo "WP_THEME_REMOTE_PATH must end with $suffix"
                exit 1
                ;;
            esac

            wordpress_root="${themes_path%$suffix}"
            htaccess="$wordpress_root/.htaccess"

            if [ ! -f "$htaccess" ]; then
              echo "Missing live .htaccess at $htaccess"
              exit 1
            fi

            timestamp="$(date +%Y%m%d-%H%M%S)"
            backup="$wordpress_root/.htaccess.atoc-backup-$timestamp"
            temporary="$wordpress_root/.htaccess.atoc-new-$timestamp"
            cp -p "$htaccess" "$backup"

            {
              printf '%s\n' \
                '# BEGIN ATOC Canonical Host' \
                '<IfModule mod_rewrite.c>' \
                'RewriteEngine On' \
                'RewriteRule ^events/?$ https://www.atocbar.com/sports [R=301,L,NE]' \
                'RewriteCond %{HTTPS} !=on [OR]' \
                'RewriteCond %{HTTP_HOST} !^www\.atocbar\.com$ [NC]' \
                'RewriteRule ^ https://www.atocbar.com%{REQUEST_URI} [R=301,L,NE]' \
                'RewriteRule ^$ - [E=Cache-Control:no-cache]' \
                'RewriteRule ^robots\.txt$ /wp-content/themes/atoc-bar-v2/robots.txt [L]' \
                '</IfModule>' \
                '# END ATOC Canonical Host' \
                ''
              sed '/^# BEGIN ATOC Canonical Host$/,/^# END ATOC Canonical Host$/d' "$htaccess"
            } > "$temporary"

            mv "$temporary" "$htaccess"
            echo "Backed up .htaccess to $backup"
            echo "Installed ATOC canonical redirect block"

      - name: Deploy atoc-bar-v2 only
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WP_DEPLOY_HOST }}
          username: ${{ secrets.WP_DEPLOY_USER }}
          port: ${{ secrets.WP_DEPLOY_PORT }}
          password: ${{ secrets.WP_DEPLOY_PASSWORD }}
          key: ${{ secrets.WP_DEPLOY_SSH_KEY }}
          source: deploy/wordpress-theme/atoc-bar-v2
          target: ${{ secrets.WP_THEME_REMOTE_PATH }}
          strip_components: 2
          overwrite: true
